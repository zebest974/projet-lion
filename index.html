<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="stylesheet" href="style.css" />
  <title>Sommaire</title>
</head>
<body>
  <main id="app">
    <div class="card">
      <div class="extra-top-left" aria-hidden="false" title="Illustration">
        <img src="fael.png" alt="Illustration sommaire" />
      </div>
      <img src="les felins.JPG" alt="Les plus grands félins" id="hero" />
      <div class="overlay" id="panel">
        <h2>Sommaire</h2>
        <p>Bienvenue — découvrez le lion et ses pages associées. Appuyez sur le logo pour accéder à la page principale du lion.</p>
      </div>

      <nav class="controls" style="justify-content:center;">
        <!-- Remplaced individual page buttons with a centered logo below the illustration -->
      </nav>

      <div class="logo-container" aria-hidden="false" style="display:flex;justify-content:center;padding:12px 0 18px 0;">
        <!-- added fael.png alongside the logos -->

        <div class="logo-pair" role="group" aria-label="Logos">
          <a href="lion.html" class="logo-link logo-below" aria-label="Accéder à la page du lion">
            <img src="logolion.png" alt="Logo lion" />
          </a>
          <a href="https://www.crazygames.com/game/tiger-simulator-3d" target="_blank" rel="noopener" class="logo-link logo-below" aria-label="Ouvrir Tiger Simulator 3D">
            <img src="tigrelogo.png" alt="Logo tigre" />
          </a>
          <a href="https://www.crazygames.com/game/cougar-simulator-big-cats" target="_blank" rel="noopener" class="logo-link logo-below" aria-label="Ouvrir Cougar Simulator">
            <img src="cougar.png" alt="Logo cougar" />
          </a>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
